<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Redirecting to directory.skz.dev</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="theme-color" content="#050505">
	<meta name="color-scheme" content="dark">

	<link rel="canonical" href="https://directory.skz.dev/">
	<meta http-equiv="refresh" content="0; url=https://directory.skz.dev/">
	<script>
		// Preserve query/hash on redirect, use replace so the back button doesn't trap the user.
		location.replace("https://directory.skz.dev/" + (location.search || "") + (location.hash || ""));
	</script>
	<style>
		html, body {
			margin: 0;
			background: #050505;
			color: rgba(246, 246, 240, 0.62);

			font-size: 12px;
			letter-spacing: 0.32em;
			text-transform: uppercase;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			-webkit-font-smoothing: antialiased;
		}
		a { color: #f6f6f0; text-decoration: none; }
		a:hover { text-decoration: underline; }
	</style>
</head>
<body>
	<noscript>
		Redirecting → <a href="https://directory.skz.dev/">directory.skz.dev</a>
